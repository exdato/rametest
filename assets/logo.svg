<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00C8FF"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#A8CCEE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M26 4 L46 12 L46 30 C46 40 36 47 26 50 C16 47 6 40 6 30 L6 12 Z"
        fill="url(#shieldGrad)" filter="url(#glow)"/>

  <!-- Shield inner highlight -->
  <path d="M26 8 L42 15 L42 30 C42 38 34 44 26 47 C18 44 10 38 10 30 L10 15 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Lock icon inside shield -->
  <rect x="19" y="26" width="14" height="11" rx="2" fill="white" opacity="0.95"/>
  <path d="M20 26 L20 22 C20 18.5 32 18.5 32 22 L32 26" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <circle cx="26" cy="31" r="2" fill="url(#shieldGrad)"/>
  <rect x="25" y="31" width="2" height="3" rx="1" fill="url(#shieldGrad)"/>

  <!-- Brand name: SMART -->
  <text x="58" y="24"
        font-family="'Orbitron', 'Arial Black', sans-serif"
        font-size="17" font-weight="900"
        fill="url(#textGrad)"
        letter-spacing="3">SMART</text>

  <!-- Brand name: SECURITY -->
  <text x="58" y="42"
        font-family="'Orbitron', 'Arial Black', sans-serif"
        font-size="13" font-weight="700"
        fill="url(#shieldGrad)"
        letter-spacing="4">SECURITY</text>

  <!-- Tagline dot separator -->
  <line x1="58" y1="28" x2="215" y2="28" stroke="rgba(0,200,255,0.12)" stroke-width="0.5"/>
</svg>
